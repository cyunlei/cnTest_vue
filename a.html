<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postman form-data 表格（最终完美版）</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        }

        /* 外层容器 */
        .outer-container {
            width: 95%;
            margin: 20px auto;
            position: relative;
        }

        /* 表格容器 */
        .table-container {
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            overflow: visible;
            position: relative;
        }

        /* 核心表格样式 */
        .form-data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            color: #333;
            border: 1px solid #e0e0e0;
            table-layout: fixed;
        }

        /* 表头单元格 */
        .form-data-table th {
            background-color: #f5f5f5;
            padding: 8px 8px;
            text-align: center;
            border: 1px solid #e0e0e0;
            font-weight: 500;
            white-space: nowrap;
        }

        /* 内容单元格 */
        .form-data-table td {
            padding: 8px 8px;
            border: 1px solid #e0e0e0;
            vertical-align: middle;
            position: relative;
            transition: all 0.2s ease;
            min-height: 30px;
        }

        /* 单元格高亮样式 */
        .form-data-table td.cell-highlight {
            background-color: #f0f7fc;
            border-color: #007cbf;
        }

        /* 行悬浮样式 */
        .form-data-table .input-row:hover {
            background-color: #f9f9f9;
        }

        /* 复选框样式 */
        .form-data-table input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            margin: 0 auto;
            display: block;
        }

        /* ========== 输入框交互样式 ========== */
        .cell-wrapper {
            position: relative;
            width: 100%;
            min-height: 24px;
        }

        /* Text类型输入框 */
        .cell-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 4px 8px;
            border: 1px solid #007cbf;
            border-radius: 3px;
            font-size: 13px;
            background-color: #fff;
            z-index: 2;
            display: none;
            outline: none;
        }

        /* 只单独缩小 Description 列输入框宽度 */
        .col-desc-actions-merge .cell-input {
            width: 350px !important;
        }
        .cell-input:focus {
            display: block !important;
        }

        /* 内容展示区 */
        .cell-content {
            width: 100%;
            min-height: 24px;
            padding: 4px 8px;
            display: block;
            z-index: 1;
            cursor: text;
        }

        /* ========== File类型专属样式 ========== */
        .file-content-container {
            width: 100%;
            min-height: 24px;
            position: relative;
            border-radius: 3px;
            padding: 2px 4px;
            cursor: pointer;
            z-index: 5;
        }

        /* Select files占位暗纹 */
        .file-placeholder {
            position: absolute;
            top: 50%;
            left: 8px;
            transform: translateY(-50%);
            color: #999;
            font-size: 13px;
            pointer-events: none;
            display: block;
        }

        /* 文件统计Tag */
        .file-count-tag {
            display: none;
            align-items: center;
            padding: 2px 8px;
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 3px;
            font-size: 12px;
            color: #333;
            gap: 4px;
        }

        /* 无文件时显示占位符 */
        .file-content-container.empty .file-placeholder {
            display: block;
        }
        .file-content-container.empty .file-count-tag {
            display: none;
        }

        /* 有文件且失焦时显示统计Tag */
        .file-content-container.has-files:not(.focused) .file-placeholder {
            display: none;
        }
        .file-content-container.has-files:not(.focused) .file-count-tag {
            display: flex;
        }

        /* File选择下拉框 */
        .file-dropdown {
            position: fixed;
            z-index: 9999;
            min-width: 180px;
            max-width: 400px;
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            padding: 8px 0;
            display: none;
            margin-top: 2px;
            box-sizing: border-box;
        }

        .file-dropdown-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
        }

        .file-dropdown-item:hover {
            background-color: #f5f5f5;
        }

        .file-dropdown-item .icon {
            margin-right: 8px;
            font-size: 16px;
            color: #666;
        }

        .file-dropdown-divider {
            height: 1px;
            background-color: #e0e0e0;
            margin: 4px 0;
        }

        .file-dropdown-empty {
            padding: 8px 12px;
            font-size: 12px;
            color: #999;
        }

        /* 隐藏原生文件选择框 */
        .file-input-hidden {
            display: none;
        }

        /* File浮层样式 */
        .file-float-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 60px;
            background-color: #f0f7fc;
            border: 1px solid #007cbf;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 124, 191, 0.2);
            padding: 8px;
            z-index: 999;
            box-sizing: border-box;
            overflow-y: auto;
            display: none;
        }

        /* 浮层滚动条优化 */
        .file-float-layer::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .file-float-layer::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
        .file-float-layer::-webkit-scrollbar-track {
            background: #f5f5f5;
            border-radius: 3px;
        }

        /* 浮层内Tag容器 */
        .float-tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            width: 100%;
            height: 100%;
        }

        /* 文件Tag样式 */
        .file-tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 6px;
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 3px;
            font-size: 12px;
            color: #333;
            gap: 4px;
            white-space: nowrap;
        }

        /* Tag警告图标 */
        .file-tag-warning {
            color: #f5a623;
            font-size: 12px;
        }

        /* Tag关闭按钮 */
        .file-tag-close {
            color: #999;
            cursor: pointer;
            font-size: 12px;
            margin-left: 4px;
        }

        .file-tag-close:hover {
            color: #ff4444;
        }

        /* ========== 表头操作按钮 ========== */
        .header-actions {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .column-toggle-btn {
            color: #666;
            border: none;
            background: none;
            font-size: 16px;
            cursor: pointer;
            padding: 1px 2px;
            border-radius: 3px;
        }

        .column-toggle-btn:hover {
            background-color: #eee;
        }

        .bulk-edit-btn {
            color: #007cbf;
            text-decoration: none;
            font-size: 12px;
            cursor: pointer;
            padding: 1px 3px;
            border-radius: 3px;
            border: none;
            background: none;
        }

        .bulk-edit-btn:hover {
            background-color: #eee;
            text-decoration: underline;
        }

        /* ========== 列选择下拉框 ========== */
        .column-dropdown {
            position: absolute;
            top: 0;
            right: 0;
            width: 180px;
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            padding: 8px 0;
            display: none;
            z-index: 9999;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background-color: #f5f5f5;
        }

        .dropdown-checkbox {
            margin-right: 8px;
            width: 14px;
            height: 14px;
        }

        /* 删除按钮样式 */
        .delete-row-btn {
            color: #ff4444;
            border: none;
            background: none;
            font-size: 14px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 3px;
            display: none;
            margin-left: auto; /* 靠右对齐 */
            transition: all 0.2s;
        }

        .delete-row-btn:hover {
            background-color: #ffebee;
            color: #d32f2f;
        }

        .col-actions .delete-row-btn {
            margin: 0 auto;
        }

        /* Description+删除按钮容器 */
        .desc-delete-container {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .desc-delete-container .cell-wrapper {
            flex: 1;
            max-width: 250px;
        }

        /* ========== 列宽分配 ========== */
        .col-checkbox { width: 40px; }
        .col-key-type-header { width: 190px; }
        .col-key { width: 150px; }
        .col-type { width: 50px; }
        
        .col-value { width: 180px; position: relative; }
        .col-content-type { width: 100px; }
        .col-description { width: 180px; }
        .col-actions { width: 50px; }
        .col-desc-actions-merge { width: 300px; }
        /* ========== Bulk Edit 模式 ========== */
        .bulk-edit-container {
            width: 100%;
            height: 100%;
            min-height: 200px;
            position: relative;
            display: none;
            box-sizing: border-box;
        }

        .bulk-edit-textarea {
            width: 100%;
            height: 100%;
            min-height: 200px;
            padding: 12px;
            border: 1px solid #007cbf;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            resize: vertical;
            outline: none;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
            box-sizing: border-box;
        }

        .bulk-edit-hint {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 11px;
            color: #999;
        }

        .bulk-edit-mode .form-data-table {
            display: none;
        }
        .bulk-edit-mode .bulk-edit-container {
            display: block;
        }
    </style>
</head>
<body>
    <div class="outer-container">
        <!-- 列选择下拉菜单 -->
        <div class="column-dropdown" id="columnDropdown">
            <div class="dropdown-item">
                <input type="checkbox" class="dropdown-checkbox" id="toggleValue" checked>
                <label for="toggleValue">Value</label>
            </div>
            <div class="dropdown-item">
                <input type="checkbox" class="dropdown-checkbox" id="toggleContentType">
                <label for="toggleContentType">Content-Type</label>
            </div>
            <div class="dropdown-item">
                <input type="checkbox" class="dropdown-checkbox" id="toggleDescription" checked>
                <label for="toggleDescription">Description</label>
            </div>
        </div>

        <div class="table-container">
            <table class="form-data-table" id="formDataTable">
                <thead>
                    <tr>
                        <th class="col-checkbox"></th>
                        <th class="col-key-type-header" colspan="2">Key</th>
                        <th class="col-value">Value</th>
                        <th class="col-content-type">Content-Type</th>
                        <th class="col-description">Description</th>
                        <th class="col-actions">
                            <div class="header-actions">
                                <button class="column-toggle-btn" id="columnToggleBtn">⋯</button>
                                <button class="bulk-edit-btn" id="bulkEditBtn">Bulk Edit</button>
                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody id="formDataBody">
                    <tr class="input-row">
                        <td class="col-checkbox"><input type="checkbox"></td>
                        <td class="col-key">
                            <div class="cell-wrapper">
                                <span class="cell-content key-content" >Key</span>
                                <input type="text" class="cell-input key-input" placeholder="Key" value="">
                            </div>
                        </td>
                        <td class="col-type">
                            <select class="type-select" style="width: 100%; padding: 4px; border: 1px solid #e0e0e0; border-radius: 3px;">
                                <option selected>Text</option>
                                <option>File</option>
                            </select>
                        </td>
                        <td class="col-value">
                            <div class="cell-wrapper">
                                <span class="cell-content value-content text-content">Value</span>
                                <input type="text" class="cell-input value-input" placeholder="Value" value="">
                                <div class="file-content-container empty" style="display: none;">
                                    <span class="file-placeholder">Select files</span>
                                    <div class="file-count-tag">
                                        <span class="file-tag-warning">⚠</span>
                                        <span class="file-count-text">0 files</span>
                                    </div>
                                    <div class="file-dropdown">
                                        <div class="file-dropdown-item local-file-btn">
                                            <span class="icon">+</span>
                                            <span>New file from local machine</span>
                                        </div>
                                        <div class="file-dropdown-divider"></div>
                                        <div class="file-dropdown-item team-file-btn">
                                            <span>Files uploaded to team</span>
                                        </div>
                                        <div class="file-dropdown-empty">No file found</div>
                                    </div>
                                    <input type="file" class="file-input-hidden" multiple>
                                </div>
                            </div>
                        </td>
                        <td class="col-content-type">
                            <div class="cell-wrapper">
                                <span class="cell-content content-type-content">Auto</span>
                                <input type="text" class="cell-input content-type-input" placeholder="Content-Type" value="Auto">
                            </div>
                        </td>
                        <td class="col-desc-actions-merge" colspan="2">
                            <div class="desc-delete-container">
                                <div class="cell-wrapper">
                                    <span class="cell-content description-content" >描述</span>
                                    <input type="text" class="cell-input description-input" placeholder="描述" value="">
                                </div>
                                <button class="delete-row-btn" title="Delete this row">
                                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                                  </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="bulk-edit-container">
                <textarea class="bulk-edit-textarea" id="bulkEditTextarea" placeholder="key:value&#10;key2:value2..."></textarea>
                <div class="bulk-edit-hint">Press Enter or ESC to save and exit</div>
            </div>
        </div>
    </div>

    <script>
        // ========== 核心变量 ==========
        const outerContainer = document.querySelector('.outer-container');
        const tableBody = document.getElementById('formDataBody');
        const columnToggleBtn = document.getElementById('columnToggleBtn');
        const columnDropdown = document.getElementById('columnDropdown');
        const toggleValue = document.getElementById('toggleValue');
        const toggleContentType = document.getElementById('toggleContentType');
        const toggleDescription = document.getElementById('toggleDescription');
        
        let columnStates = {
            value: toggleValue.checked,
            contentType: toggleContentType.checked,
            description: toggleDescription.checked
        };

        // ========== 自动勾选复选框（输入内容时） ==========
        function autoCheckRow(row, input) {
            input.addEventListener('input', function() {
                const checkbox = row.querySelector('.col-checkbox input');
                if (this.value.trim() !== '') {
                    checkbox.checked = true;
                }
            });
        }

        // ========== 通用输入框逻辑 ==========
        function bindTextInputLogic(rowElement) {
            const bindSingleInput = (inputSelector, contentSelector) => {
                const input = rowElement.querySelector(inputSelector);
                const content = rowElement.querySelector(contentSelector);

                content.addEventListener('click', () => {
                    input.style.display = 'block';
                    input.focus();
                    content.closest('td').classList.add('cell-highlight');
                });

                input.addEventListener('blur', () => {
                    let displayText = input.value.trim() || 'Key';
                    if (contentSelector === '.content-type-content') {
                        displayText = input.value.trim() || 'Auto';
                    }
                    content.textContent = displayText;
                    input.style.display = 'none';
                    content.closest('td').classList.remove('cell-highlight');
                });

                input.addEventListener('input', () => {
                    let displayText = input.value.trim() || '描述';
                    if (contentSelector === '.content-type-content') {
                        displayText = input.value.trim() || 'Auto';
                    }
                    content.textContent = displayText;
                });

                // 自动勾选
                autoCheckRow(rowElement, input);
            };

            bindSingleInput('.key-input', '.key-content');
            bindSingleInput('.content-type-input', '.content-type-content');
            bindSingleInput('.description-input', '.description-content');

            const valueInput = rowElement.querySelector('.value-input');
            const valueTextContent = rowElement.querySelector('.text-content');
            valueTextContent.addEventListener('click', () => {
                valueInput.style.display = 'block';
                valueInput.focus();
                valueTextContent.closest('td').classList.add('cell-highlight');
            });

            valueInput.addEventListener('blur', () => {
                valueTextContent.textContent = valueInput.value.trim() || 'Value';
                valueInput.style.display = 'none';
                valueTextContent.closest('td').classList.remove('cell-highlight');
            });

            valueInput.addEventListener('input', () => {
                valueTextContent.textContent = valueInput.value.trim() || '-';
            });

            // 自动勾选
            autoCheckRow(rowElement, valueInput);
        }

        // ========== File类型交互逻辑 ==========
        function bindFileLogic(rowElement) {
          const typeSelect = rowElement.querySelector('.type-select');
          const valueCell = rowElement.querySelector('.col-value');
          const valueTextContent = rowElement.querySelector('.text-content');
          const valueInput = rowElement.querySelector('.value-input');
          const fileContentContainer = rowElement.querySelector('.file-content-container');
          const fileCountText = rowElement.querySelector('.file-count-text');
          const fileDropdown = rowElement.querySelector('.file-dropdown');
          const localFileBtn = rowElement.querySelector('.local-file-btn');
          const teamFileBtn = rowElement.querySelector('.team-file-btn');
          const fileInput = rowElement.querySelector('.file-input-hidden');
          const checkbox = rowElement.querySelector('.col-checkbox input');

          let selectedFiles = [];
          let floatLayer = null;
          let isDropdownVisible = false;

          // 初始化File显示
          initFileTypeDisplay();
          typeSelect.addEventListener('change', initFileTypeDisplay);

          function initFileTypeDisplay() {
            if (typeSelect.value === 'File') {
              valueTextContent.style.display = 'none';
              valueInput.style.display = 'none';
              fileContentContainer.style.display = 'block';
              valueCell.classList.remove('cell-highlight');
            } else {
              fileContentContainer.style.display = 'none';
              hideDropdown();
              valueTextContent.style.display = 'block';
              if (floatLayer) floatLayer.style.display = 'none';
            }
          }

          // 创建浮层
          function createFloatLayer() {
            if (floatLayer) return floatLayer;
            
            floatLayer = document.createElement('div');
            floatLayer.className = 'file-float-layer';
            floatLayer.innerHTML = `<div class="float-tags-container"></div>`;
            valueCell.appendChild(floatLayer);
            return floatLayer;
          }

          // 定位下拉框
          function positionDropdown() {
            if (!floatLayer || floatLayer.style.display !== 'block') return;
            
            const floatRect = floatLayer.getBoundingClientRect();
            fileDropdown.style.width = `${floatRect.width}px`;
            fileDropdown.style.left = `${floatRect.left}px`;
            fileDropdown.style.top = `${floatRect.bottom + 2}px`;
            fileDropdown.style.display = 'block';
            isDropdownVisible = true;
          }

          function showFloat() {
            document.querySelectorAll('.file-float-layer').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.file-dropdown').forEach(el => el.style.display = 'none');
            
            const layer = createFloatLayer();
            layer.style.display = 'block';
            renderTags();
            positionDropdown();
          }

          function hideDropdown() {
            fileDropdown.style.display = 'none';
            isDropdownVisible = false;
          }

          // 渲染文件标签
          function renderTags() {
            if (!floatLayer) return;
            const box = floatLayer.querySelector('.float-tags-container');
            box.innerHTML = '';
            selectedFiles.forEach((f, i) => {
              const t = document.createElement('div');
              t.className = 'file-tag';
              t.innerHTML = `<span class="file-tag-warning">⚠</span>${f.name}<span class="file-tag-close" data-i="${i}">×</span>`;
              t.querySelector('.file-tag-close').onclick = (e) => {
                e.stopPropagation();
                selectedFiles.splice(i, 1);
                renderTags();
                fileCountText.textContent = `${selectedFiles.length} files`;
                if (selectedFiles.length === 0) {
                  fileContentContainer.classList.add('empty');
                  fileContentContainer.classList.remove('has-files');
                  floatLayer.style.display = 'none';
                  hideDropdown();
                }
              };
              box.appendChild(t);
            });
          }

          // 窗口缩放监听
          window.addEventListener('resize', () => {
            if (isDropdownVisible && floatLayer) {
              positionDropdown();
            }
          });

          // 点击事件
          fileContentContainer.addEventListener('click', (e) => {
            e.stopPropagation();
            if (typeSelect.value !== 'File') return;
            showFloat();
          });

          // 点击外部关闭
          document.addEventListener('click', (e) => {
            if (!e.target.closest('.file-float-layer') && 
                !e.target.closest('.file-dropdown') && 
                !e.target.closest('.file-content-container')) {
              if (floatLayer) floatLayer.style.display = 'none';
              hideDropdown();
            }
          });

          // 文件选择
          localFileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
          });
          teamFileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
          });

          fileInput.addEventListener('change', () => {
            const arr = Array.from(fileInput.files);
            if (!arr.length) return;
            selectedFiles = [...selectedFiles, ...arr];
            fileContentContainer.classList.remove('empty');
            fileContentContainer.classList.add('has-files');
            fileCountText.textContent = `${selectedFiles.length} files`;
            checkbox.checked = true; // 选择文件自动勾选
            renderTags();
            hideDropdown();
          });
        }

        // ========== 列选择下拉框定位 ==========
        function bindDropdownPosition() {
            columnToggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const btnRect = columnToggleBtn.getBoundingClientRect();
                const outerRect = outerContainer.getBoundingClientRect();
                
                columnDropdown.style.top = `${btnRect.top - outerRect.top + 30}px`;
                columnDropdown.style.left = `${btnRect.left - outerRect.left - 150}px`;
                columnDropdown.style.display = columnDropdown.style.display === 'block' ? 'none' : 'block';
            });

            document.addEventListener('click', () => {
                columnDropdown.style.display = 'none';
            });
        }

        // ========== 列显示/隐藏逻辑 ==========
        function updateColumnVisibility() {
            document.querySelector('.col-value').style.display = columnStates.value ? '' : 'none';
            document.querySelector('.col-content-type').style.display = columnStates.contentType ? '' : 'none';
            document.querySelector('.col-description').style.display = columnStates.description ? '' : 'none';
            document.querySelector('.col-actions').style.display = '';

            const rows = document.querySelectorAll('.input-row');
            rows.forEach(row => {
                row.querySelector('.col-value').style.display = columnStates.value ? '' : 'none';
                row.querySelector('.col-content-type').style.display = columnStates.contentType ? '' : 'none';
                row.querySelector('.col-desc-actions-merge').style.display = columnStates.description ? '' : 'none';
            });
        }

        function bindColumnToggleEvents() {
            toggleValue.addEventListener('change', () => {
                columnStates.value = toggleValue.checked;
                updateColumnVisibility();
            });

            toggleContentType.addEventListener('change', () => {
                columnStates.contentType = toggleContentType.checked;
                updateColumnVisibility();
            });

            toggleDescription.addEventListener('change', () => {
                columnStates.description = toggleDescription.checked;
                updateColumnVisibility();
            });
        }

        // ========== 删除按钮逻辑（原版：悬浮 / 聚焦 显示，最后一行不显示） ==========
        function updateDeleteButtons() {
            const rows = document.querySelectorAll('.input-row');
            const hoveredRow = document.querySelector('.input-row.hovered');
            const focusedRow = document.querySelector('.input-row:focus-within');

            rows.forEach(row => {
                row.querySelector('.delete-row-btn').style.display = 'none';
            });

            let targetRow = hoveredRow || focusedRow;
            if (targetRow && targetRow !== rows[rows.length - 1] && rows.length > 1) {
                targetRow.querySelector('.delete-row-btn').style.display = 'block';
            }
        }

        function bindRowEvents(rowElement) {
            rowElement.addEventListener('mouseenter', () => {
                rowElement.classList.add('hovered');
                updateDeleteButtons();
            });
            rowElement.addEventListener('mouseleave', () => {
                rowElement.classList.remove('hovered');
                updateDeleteButtons();
            });

            rowElement.addEventListener('focusin', updateDeleteButtons);
            rowElement.addEventListener('focusout', updateDeleteButtons);
        }

        // ========== 自动新增行 ==========
        function setupInputListener(inputElement) {
            inputElement.addEventListener('input', function() {
                if (this.value.trim() !== '' && this.closest('.input-row') === tableBody.lastElementChild) {
                    addNewInputRow();
                }
            });
        }

        function addNewInputRow() {
            const newRow = document.createElement('tr');
            newRow.className = 'input-row';
            
            newRow.innerHTML = `
                <td class="col-checkbox"><input type="checkbox"></td>
                <td class="col-key">
                    <div class="cell-wrapper">
                        <span class="cell-content key-content">Key</span>
                        <input type="text" class="cell-input key-input" placeholder="Key" value="">
                    </div>
                </td>
                <td class="col-type">
                    <select class="type-select" style="width: 100%; padding: 4px; border: 1px solid #e0e0e0; border-radius: 3px;">
                        <option selected>Text</option>
                        <option>File</option>
                    </select>
                </td>
                <td class="col-value">
                    <div class="cell-wrapper">
                        <span class="cell-content value-content text-content">Value</span>
                        <input type="text" class="cell-input value-input" placeholder="Value" value="">
                        <div class="file-content-container empty" style="display: none;">
                            <span class="file-placeholder">Select files</span>
                            <div class="file-count-tag">
                                <span class="file-tag-warning">⚠</span>
                                <span class="file-count-text">0 files</span>
                            </div>
                            <div class="file-dropdown">
                                <div class="file-dropdown-item local-file-btn">
                                    <span class="icon">+</span>
                                    <span>New file from local machine</span>
                                </div>
                                <div class="file-dropdown-divider"></div>
                                <div class="file-dropdown-item team-file-btn">
                                    <span>Files uploaded to team</span>
                                </div>
                                <div class="file-dropdown-empty">No file found</div>
                            </div>
                            <input type="file" class="file-input-hidden" multiple>
                        </div>
                    </div>
                </td>
                <td class="col-content-type">
                    <div class="cell-wrapper">
                        <span class="cell-content content-type-content">Auto</span>
                        <input type="text" class="cell-input content-type-input" placeholder="Content-Type" value="Auto">
                    </div>
                </td>
                <td class="col-desc-actions-merge" colspan="2">
                    <div class="desc-delete-container">
                        <div class="cell-wrapper">
                            <span class="cell-content description-content">描述</span>
                            <input type="text" class="cell-input description-input" placeholder="描述" value="">
                        </div>
                        <button class="delete-row-btn" title="删除该行">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                          </svg>
                        </button>
                    </div>
                </td>
            `;
            
            tableBody.appendChild(newRow);

            bindTextInputLogic(newRow);
            bindFileLogic(newRow);
            bindRowEvents(newRow);

            const newKeyInput = newRow.querySelector('.key-input');
            const newValueInput = newRow.querySelector('.value-input');
            setupInputListener(newKeyInput);
            setupInputListener(newValueInput);

            const deleteBtn = newRow.querySelector('.delete-row-btn');
            deleteBtn.addEventListener('click', () => deleteRow(newRow));

            updateColumnVisibility();
            updateDeleteButtons();
        }

        // ========== 删除行 ==========
        function deleteRow(rowElement) {
            const rows = document.querySelectorAll('.input-row');
            if (rows.length <= 1) return;
            rowElement.remove();
            updateDeleteButtons();
        }
        
        // ========== Bulk Edit 功能 ==========
        let isBulkEditMode = false;
        const bulkEditTextarea = document.getElementById('bulkEditTextarea');
        const tableContainer = document.querySelector('.table-container');
        const bulkEditBtn = document.getElementById('bulkEditBtn');

        // 切换 Bulk Edit 模式
        function toggleBulkEditMode() {
            isBulkEditMode = !isBulkEditMode;
            tableContainer.classList.toggle('bulk-edit-mode', isBulkEditMode);

            if (isBulkEditMode) {
                // 进入 Bulk Edit：从表格生成文本
                const text = generateBulkEditText();
                bulkEditTextarea.value = text;
                bulkEditTextarea.focus();
            } else {
                // 退出 Bulk Edit：从文本解析回表格
                parseBulkEditText(bulkEditTextarea.value);
            }
        }

        // 从表格生成 Bulk Edit 文本（只包含 Text 类型）
        function generateBulkEditText() {
            const rows = document.querySelectorAll('.input-row');
            const lines = [];

            rows.forEach(row => {
                const typeSelect = row.querySelector('.type-select');
                if (typeSelect.value !== 'Text') return;

                const key = row.querySelector('.key-content').textContent.trim();
                const value = row.querySelector('.text-content').textContent.trim();

                if (key !== '-' && key !== '') {
                    const displayValue = value === '-' ? '' : value;
                    lines.push(`${key}:${displayValue}`);
                }
            });

            return lines.join('\n');
        }

        // 从 Bulk Edit 文本解析回表格
        function parseBulkEditText(text) {
            const lines = text.split('\n').map(line => line.trim()).filter(line => line !== '');
            const rows = Array.from(document.querySelectorAll('.input-row'));

            // 清空所有 Text 行的 Key/Value
            rows.forEach(row => {
                const typeSelect = row.querySelector('.type-select');
                if (typeSelect.value === 'Text') {
                    const keyInput = row.querySelector('.key-input');
                    const valueInput = row.querySelector('.value-input');
                    keyInput.value = '';
                    valueInput.value = '';
                    keyInput.dispatchEvent(new Event('blur'));
                    valueInput.dispatchEvent(new Event('blur'));
                }
            });

            // 按行依次填充
            lines.forEach((line, idx) => {
                const [keyPart, ...valueParts] = line.split(':');
                const key = keyPart.trim();
                const value = valueParts.join(':').trim();

                if (key === '') return;

                let targetRow = rows[idx];
                if (!targetRow) {
                    addNewInputRow();
                    targetRow = document.querySelector('.input-row:last-child');
                }

                const typeSelect = targetRow.querySelector('.type-select');
                if (typeSelect.value !== 'Text') {
                    typeSelect.value = 'Text';
                    typeSelect.dispatchEvent(new Event('change'));
                }

                const keyInput = targetRow.querySelector('.key-input');
                const valueInput = targetRow.querySelector('.value-input');
                keyInput.value = key;
                valueInput.value = value;
                keyInput.dispatchEvent(new Event('blur'));
                valueInput.dispatchEvent(new Event('blur'));
            });
        }

        // 绑定 Bulk Edit 点击事件
        function bindBulkEdit() {
            bulkEditBtn.addEventListener('click', (e) => {
                e.preventDefault();
                toggleBulkEditMode();
            });

            // 按 Enter / ESC 退出 Bulk Edit
            bulkEditTextarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    toggleBulkEditMode();
                }
                if (e.key === 'Escape') {
                    toggleBulkEditMode();
                }
            });
        }

        
        // ========== 初始化 ==========
        function init() {
            bindDropdownPosition();
            bindColumnToggleEvents();
            updateColumnVisibility();

            const initialRow = document.querySelector('.input-row');
            bindTextInputLogic(initialRow);
            bindFileLogic(initialRow);
            bindRowEvents(initialRow);

            const initialKeyInput = document.querySelector('.key-input');
            const initialValueInput = document.querySelector('.value-input');
            setupInputListener(initialKeyInput);
            setupInputListener(initialValueInput);

            const initialDeleteBtn = document.querySelector('.delete-row-btn');
            initialDeleteBtn.addEventListener('click', () => deleteRow(initialDeleteBtn.closest('.input-row')));

            bindBulkEdit();
            
            updateDeleteButtons();
        }

        init();
    </script>
</body>
</html>
