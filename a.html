<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body 格式化工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .container {
            width: 875px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            margin: 20px;
            position: relative;
        }
        .tabs-header {
            display: flex;
            background-color: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
        }
        .tab-item {
            padding: 12px 16px;
            font-size: 14px;
            color: #4b5563;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab-item.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
            font-weight: 500;
        }
        .content-types {
            display: flex;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            background-color: #fff;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }
        .radio-group {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #4b5563;
            cursor: pointer;
        }
        .radio-group input[type="radio"] {
            cursor: pointer;
        }
        .radio-group.active {
            color: #2563eb;
            font-weight: 500;
        }
        .format-select {
            position: relative;
            font-size: 13px;
            color: #25aae2;
            cursor: pointer;
            padding: 4px 0;
            user-select: none;
            display: none;
        }
        .select-dropdown {
            display: none;
            position: absolute;
            top: 24px;
            left: 0;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            width: 49px;
            z-index: 9999;
        }
        .select-dropdown div {
            padding: 6px 8px;
            font-size: 12px;
            color: #333;
        }
        .select-dropdown div:hover {
            background-color: #f3f6f6;
        }
        .format-btn {
            margin-left: auto;
            font-size: 13px;
            color: #2563eb;
            cursor: pointer;
            display: none;
        }
        .format-btn:hover {
            text-decoration: underline;
        }
        .body-area {
            position: relative;
            padding: 0;
        }
        .nested-container {
            width: 100%;
            height: 200px;
            border: none;
            border-radius: 0;
            padding: 0 16px;
            margin-top: 8px;
            background-color: #fff;
            display: none;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .editor {
            width: 100%;
            min-height: 180px;
            height: 180px;
            border: 1px solid #d1d5db;
            border-radius: 0;
            padding: 0;
            font-size: 14px;
            resize: vertical;
            font-family: "Consolas", "Monaco", "Courier New", monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            overflow-y: auto;
            outline: none;
        }
        .editor.none {
            display: none;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            background-color: #f9fafb;
            cursor: not-allowed;
            resize: none;
        }

        .form-data-table,
        .urlencoded-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            overflow: visible !important;
        }
        .form-data-table th,
        .urlencoded-table th {
            background-color: #f8f9fa;
            color: #374151;
            font-size: 12px;
            font-weight: 600;
            height: 35px !important;
            line-height: 35px !important;
            padding: 0 8px;
            text-align: center !important;
            border-bottom: 1px solid #e5e7eb;
            border-left: 1px solid #e5e7eb;
            vertical-align: middle;
            position: relative;
            white-space: nowrap;
        }
        .form-data-table th:last-child,
        .urlencoded-table th:last-child {
            border-right: 1px solid #e5e7eb;
        }

        .col-bulk {
            width: 70px !important;
            padding: 0 4px !important;
            min-width: 70px !important;
            white-space: nowrap;
        }
        .header-bulk-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .header-bulk-edit {
            font-size: 11px;
            color: #2563eb;
            cursor: pointer;
        }
        .header-more-btn {
            font-size: 13px;
            cursor: pointer;
            color: #6b7280;
            padding: 0 2px;
        }
        .global-dropdown {
            display: none;
            position: fixed;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            width: 130px;
            padding: 8px;
            z-index: 99999;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .global-dropdown .dropdown-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            font-size: 12px;
            color: #4b5563;
            cursor: pointer;
        }
        .header-bulk-edit {
            font-size: 12px;
            color: #2563eb;
            cursor: pointer;
            white-space: nowrap;
        }

        .form-data-table td,
        .urlencoded-table td {
            height: 35px !important;
            padding: 0;
            font-size: 13px;
            color: #4b5563;
            text-align: center !important;
            border-bottom: 1px solid #e5e7eb;
            border-left: 1px solid #e5e7eb;
            vertical-align: middle;
            position: relative;
        }
        .form-data-table td:last-child,
        .urlencoded-table td:last-child {
            border-right: 1px solid #e5e7eb;
        }
        .form-data-table tbody tr:last-child td,
        .urlencoded-table tbody tr:last-child td {
            border-bottom: none;
        }

        .col-checkbox { width: 36px; padding: 0 8px !important; }
        .col-key { width: 180px; }
        .col-value { width: 140px; }
        .col-content-type { width: 110px;}
        .col-desc { width: 180px; }

        .key-split-table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            text-align: center !important;
        }
        .key-split-table td {
            padding: 4px;
            border: 1px solid #e5e7eb;
            height: 27px;
            margin: 0;
            text-align: center !important;
            vertical-align: middle;
            position: static;
        }
        .key-input-cell { width: 92%; }
        .type-select-cell { width: 8%; }
        .key-input {
            width: 90%;
            border: 1px solid #d1d5db;
            padding: 4px;
            border-radius: 4px;
            font-size: 13px;
            text-align: center;
            margin: 0 auto;
            outline: none;
            box-sizing: border-box;
        }

        .table-input {
            width: 90%;
            border: 1px solid #d1d5db;
            padding: 4px;
            border-radius: 4px;
            font-size: 13px;
            text-align: center;
            margin: 0 auto;
            outline: none;
            box-sizing: border-box;
        }

        .desc-input-wrapper {
            width: 100%;
            height: 100%;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-value-type-select {
            position: relative;
            display: inline-block;
            text-align: center;
        }
        .row-value-type-btn {
            padding: 2px 4px;
            font-size: 11px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            text-align: center;
            width: 40px;
        }
        .row-value-type-dropdown {
            display: none;
            position: fixed;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            width: 60px;
            z-index: 99999;
            text-align: center;
        }
        .row-value-type-dropdown div {
            padding: 4px 6px;
            font-size: 11px;
            color: #333;
            cursor: pointer;
        }

        .hide-column {
            display: none !important;
        }

        .binary-file-area {
            display: none;
            resize: none;
            padding: 16px;
        }
        .file-select-btn {
            padding: 8px 16px;
            border: 2px solid #2563eb;
            border-radius: 4px;
            background: #fff;
            color: #2563eb;
            cursor: pointer;
            font-size: 14px;
            width: 240px;
            text-align: left;
        }
        .file-dropdown {
            margin-top: 8px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            width: 240px;
            background: #fff;
        }
        .file-dropdown div {
            padding: 8px 16px;
            font-size: 13px;
            color: #4b5563;
            cursor: pointer;
        }
        .json-key { color: #92278f; }
        .json-string { color: #3ab54a; }
        .json-number { color: #25aae2; }
        .json-boolean { color: #f98280; }
        .json-null { color: #f1592a; }
        .json-brace { color: #586e75; }

        /* 新增：文件选择下拉样式 */
        .value-wrapper {
            position: relative;
            width: 100%;
        }
        .file-select-dropdown {
            position: absolute;
            top: 100%;
            left: 5%;
            width: 90%;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: none;
        }
        .file-option {
            padding: 6px 8px;
            cursor: pointer;
            font-size: 12px;
            text-align: left;
        }
        .file-option:hover {
            background-color: #f3f6f6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs-header">
            <div class="tab-item">Params</div>
            <div class="tab-item">Headers</div>
            <div class="tab-item active">Body</div>
            <div class="tab-item">IPPort</div>
            <div class="tab-item">加密</div>
        </div>
        <div class="content-types">
            <label class="radio-group"><input type="radio" name="contentType" value="none"> none</label>
            <label class="radio-group active"><input type="radio" name="contentType" value="form-data" checked> form-data</label>
            <label class="radio-group"><input type="radio" name="contentType" value="x-www-form-urlencoded"> x-www-form-urlencoded</label>
            <label class="radio-group"><input type="radio" name="contentType" value="raw"> raw</label>
            <label class="radio-group"><input type="radio" name="contentType" value="binary"> binary</label>
            <label class="radio-group"><input type="radio" name="contentType" value="graphql"> GraphQL</label>

            <div class="format-select" id="typeText">
                JSON
                <div class="select-dropdown" id="dropdown">
                    <div onclick="switchType('TEXT')">TEXT</div><div onclick="switchType('JSON')">JSON</div>
                    <div onclick="switchType('XML')">XML</div><div onclick="switchType('HTML')">HTML</div>
                </div>
            </div>
            <div class="format-btn" id="formatBtn" onclick="formatContent()">格式化</div>
        </div>
        
        <div class="body-area">
            <div class="editor none" id="noneEditor">此请求没有请求体</div>

            <div class="nested-container" id="formDataContainer">
                <table class="form-data-table">
                    <thead>
                        <tr>
                            <th class="col-checkbox"></th>
                            <th class="col-key">Key</th>
                            <th class="col-value">Value</th>
                            <th class="col-content-type hide-column">Content-Type</th>
                            <th class="col-desc">Description</th>
                            <th class="col-bulk">
                                <div class="header-bulk-wrapper">
                                    <div class="header-more-container" id="moreContainer">
                                        <div class="header-more-btn" id="moreBtn">⋯</div>
                                    </div>
                                    <span class="header-bulk-edit">Bulk Edit</span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="col-checkbox"><input type="checkbox"></td>
                            <td class="col-key">
                                <table class="key-split-table">
                                    <tr>
                                        <td class="key-input-cell"><input type="text" class="key-input" placeholder="Key"></td>
                                        <td class="type-select-cell">
                                            <div class="row-value-type-select">
                                                <div class="row-value-type-btn">Text</div>
                                                <div class="row-value-type-dropdown">
                                                    <div>Text</div>
                                                    <div>File</div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </table>
                            </td>
                            <td class="col-value">
                                <div class="value-wrapper">
                                    <input type="text" class="table-input value-input" placeholder="Value">
                                    <div class="file-select-dropdown">
                                        <div class="file-option">+选择本地文件</div>
                                    </div>
                                </div>
                            </td>
                            <td class="col-content-type hide-column"><input type="text" class="table-input" placeholder="Auto" value="Auto"></td>
                            <td class="col-desc">
                                <div class="desc-input-wrapper"><input type="text" class="table-input" placeholder="Description"></div>
                            </td>
                            <td class="col-bulk"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="nested-container" id="urlencodedContainer">
                <table class="urlencoded-table">
                    <thead>
                        <tr>
                            <th class="col-checkbox"></th>
                            <th class="col-key">Key</th>
                            <th class="col-value">Value</th>
                            <th class="col-content-type hide-column">Content-Type</th>
                            <th class="col-desc">Description</th>
                            <th class="col-bulk">
                                <div class="header-bulk-wrapper">
                                    <div class="header-more-container">
                                        <div class="header-more-btn" id="moreBtn2">⋯</div>
                                    </div>
                                    <span class="header-bulk-edit">Bulk Edit</span>
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="col-checkbox"><input type="checkbox"></td>
                            <td class="col-key">
                                <table class="key-split-table">
                                    <tr>
                                        <td class="key-input-cell"><input type="text" class="key-input" placeholder="Key"></td>
                                        <td class="type-select-cell">
                                            <div class="row-value-type-select">
                                                <div class="row-value-type-btn">Text</div>
                                                <div class="row-value-type-dropdown">
                                                    <div>Text</div>
                                                    <div>File</div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </table>
                            </td>
                            <td class="col-value">
                                <div class="value-wrapper">
                                    <input type="text" class="table-input value-input" placeholder="Value">
                                    <div class="file-select-dropdown">
                                        <div class="file-option">+选择本地文件</div>
                                    </div>
                                </div>
                            </td>
                            <td class="col-content-type hide-column"><input type="text" class="table-input" placeholder="Auto" value="Auto"></td>
                            <td class="col-desc">
                                <div class="desc-input-wrapper"><input type="text" class="table-input" placeholder="Description"></div>
                            </td>
                            <td class="col-bulk"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="binary-file-area" id="binaryArea">
                <div class="file-select-btn">Select file</div>
                <div class="file-dropdown">
                    <div class="new-file">+ New file from local machine</div>
                    <div>Files uploaded to team</div>
                    <div class="no-file">No file found</div>
                </div>
            </div>
            <div class="editor" id="rawEditor" contenteditable="true" placeholder="请输入内容..."></div>
        </div>
    </div>

    <div class="global-dropdown" id="tableDropdown">
        <label class="dropdown-item">
            <input type="checkbox" value="value" onchange="toggleColumn()" checked> value
        </label>
        <label class="dropdown-item">
            <input type="checkbox" value="contentType" onchange="toggleColumn()"> Content-Type
        </label>
        <label class="dropdown-item">
            <input type="checkbox" value="desc" onchange="toggleColumn()" checked> Description
        </label>
    </div>

    <script>
        let currentType = 'JSON';
        const moreBtn = document.getElementById('moreBtn');
        const moreBtn2 = document.getElementById('moreBtn2');
        const tableDropdown = document.getElementById('tableDropdown');
        let activeDropdown = null;

        window.onload = function() {
            hideAllAreas();
            showFormData();
            bindDropdownEvents(moreBtn, tableDropdown);
            bindDropdownEvents(moreBtn2, tableDropdown);
            initTableEvents();
            toggleColumn();
            bindDropdownEvents(document.getElementById('typeText'), document.getElementById('dropdown'));
            
            // 全局点击关闭所有下拉框
            document.addEventListener('click', function(e) {
                if (activeDropdown && !activeDropdown.contains(e.target)) {
                    closeAllDropdowns();
                }
            });
        }

        // 关闭所有下拉框（核心修复函数）
        function closeAllDropdowns() {
            if (activeDropdown) {
                activeDropdown.style.display = 'none';
                activeDropdown = null;
            }
        }

        function initTableEvents() {
            bindTableEvents('.form-data-table');
            bindTableEvents('.urlencoded-table');
        }

        function bindTableEvents(tableSelector) {
            const table = document.querySelector(tableSelector);
            if (!table) return; // 新增：校验table是否存在
            const tbody = table.querySelector('tbody');
            if (!tbody) return; // 新增：校验tbody是否存在
            const rows = tbody.querySelectorAll('tr');
            rows.forEach(row => bindRowEvents(row, tableSelector));
        }

        // 核心修复：全量增加null校验，避免空指针
        function bindRowEvents(row, tableSel) {
            // 获取元素并做null检查
            const keyInput = row.querySelector('.key-input');
            const valueInput = row.querySelector('.value-input');
            const checkbox = row.querySelector('.col-checkbox input');
            const typeBtn = row.querySelector('.row-value-type-btn');
            const typeDropdown = row.querySelector('.row-value-type-dropdown');
            const fileDropdown = row.querySelector('.file-select-dropdown');
            // 修正：先找fileDropdown再找fileOption，避免直接获取null
            const fileOption = fileDropdown ? fileDropdown.querySelector('.file-option') : null;

            // 绑定类型选择按钮的事件（仅当元素存在时）
            if (typeBtn && typeDropdown) {
                bindDropdownEvents(typeBtn, typeDropdown);
                // 绑定类型下拉选项的点击事件
                typeDropdown.querySelectorAll('div').forEach(item => {
                    item.addEventListener('click', () => {
                        typeBtn.textContent = item.textContent;
                        closeAllDropdowns();
                        
                        // 确保valueInput存在时才修改属性
                        if (valueInput) {
                            if (item.textContent === 'File') {
                                valueInput.placeholder = '选择文件';
                                valueInput.readOnly = true;
                                valueInput.style.cursor = 'pointer';
                                if (fileDropdown) {
                                    fileDropdown.style.display = 'block';
                                }
                            } else {
                                valueInput.placeholder = 'Value';
                                valueInput.readOnly = false;
                                valueInput.style.cursor = 'text';
                                if (fileDropdown) {
                                    fileDropdown.style.display = 'none';
                                }
                                valueInput.value = '';
                            }
                        }
                    });
                });
            }

            // 绑定valueInput和fileDropdown的事件（仅当元素存在时）
            if (valueInput && fileDropdown) {
                bindDropdownEvents(valueInput, fileDropdown);
            }

            // 绑定文件选择选项的点击事件（仅当元素存在时）
            if (fileOption) {
                fileOption.addEventListener('click', () => {
                    const fileInput = document.createElement('input');
                    fileInput.type = 'file';
                    fileInput.multiple = true;
                    fileInput.onchange = (e) => {
                        const files = Array.from(e.target.files).map(f => f.name).join(', ');
                        if (valueInput) {
                            valueInput.value = files;
                        }
                        if (fileDropdown) {
                            fileDropdown.style.display = 'none';
                        }
                    };
                    fileInput.click();
                });
            }

            // 处理输入事件（仅当keyInput和valueInput存在时）
            if (keyInput && valueInput && checkbox) {
                function handleInput() {
                    if(keyInput.value.trim() || valueInput.value.trim()) {
                        checkbox.checked = true;
                        const tbody = document.querySelector(tableSel)?.querySelector('tbody');
                        if(tbody && row === tbody.lastElementChild) {
                            addNewRow(tableSel);
                        }
                    }
                }
                keyInput.addEventListener('input', handleInput);
                valueInput.addEventListener('input', handleInput);
            }
        }

        function addNewRow(tableSelector) {
            const tbody = document.querySelector(tableSelector).querySelector('tbody');
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td class="col-checkbox"><input type="checkbox"></td>
                <td class="col-key">
                    <table class="key-split-table">
                        <tr>
                            <td class="key-input-cell"><input type="text" class="key-input" placeholder="Key"></td>
                            <td class="type-select-cell">
                                <div class="row-value-type-select">
                                    <div class="row-value-type-btn">Text</div>
                                    <div class="row-value-type-dropdown">
                                        <div>Text</div>
                                        <div>File</div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </table>
                </td>
                <td class="col-value">
                    <div class="value-wrapper">
                        <input type="text" class="table-input value-input" placeholder="Value">
                        <div class="file-select-dropdown">
                            <div class="file-option">+选择本地文件</div>
                        </div>
                    </div>
                </td>
                <td class="col-content-type hide-column"><input type="text" class="table-input" placeholder="Auto" value="Auto"></td>
                <td class="col-desc">
                    <div class="desc-input-wrapper"><input type="text" class="table-input" placeholder="Description"></div>
                </td>
                <td class="col-bulk"></td>
            `;
            tbody.appendChild(newRow);
            bindRowEvents(newRow, tableSelector);
        }

        // 终极修复：下拉框绑定（点击显示+鼠标离开关闭）
        function bindDropdownEvents(trigger, dropdown) {
            if(!trigger || !dropdown) return; // 新增：空值校验
            
            trigger.addEventListener('click', function(e) {
                e.stopPropagation();
                closeAllDropdowns();
                
                const rect = this.getBoundingClientRect();
                dropdown.style.left = rect.left + 'px';
                dropdown.style.top = (rect.bottom + 2) + 'px';
                dropdown.style.display = 'block';
                activeDropdown = dropdown;
            });

            // 鼠标离开下拉框 → 自动关闭
            dropdown.addEventListener('mouseleave', function() {
                closeAllDropdowns();
            });

            dropdown.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        }

        function toggleColumn() {
            const showValue = document.querySelector('input[value="value"]').checked;
            const showCt = document.querySelector('input[value="contentType"]').checked;
            const showDesc = document.querySelector('input[value="desc"]').checked;

            document.querySelectorAll('.col-value').forEach(el => el.classList.toggle('hide-column', !showValue));
            document.querySelectorAll('.col-content-type').forEach(el => el.classList.toggle('hide-column', !showCt));
            document.querySelectorAll('.col-desc').forEach(el => el.classList.toggle('hide-column', !showDesc));
        }

        const radioGroups = document.querySelectorAll('.radio-group');
        radioGroups.forEach(label => {
            label.addEventListener('click', () => {
                radioGroups.forEach(l => l.classList.remove('active'));
                label.classList.add('active');
                hideAllAreas();
                const v = label.querySelector('input').value;
                switch(v) {
                    case 'none': showNone(); break;
                    case 'form-data': showFormData(); break;
                    case 'x-www-form-urlencoded': showUrlencoded(); break;
                    case 'raw': showRaw(); break;
                    case 'binary': showBinary(); break;
                    case 'graphql': showGraphQL(); break;
                }
            });
        });

        function hideAllAreas() {
            document.getElementById('noneEditor').style.display = 'none';
            document.getElementById('formDataContainer').style.display = 'none';
            document.getElementById('urlencodedContainer').style.display = 'none';
            document.getElementById('binaryArea').style.display = 'none';
            document.getElementById('rawEditor').style.display = 'none';
            document.getElementById('typeText').style.display = 'none';
            document.getElementById('formatBtn').style.display = 'none';
        }
        function showNone(){ document.getElementById('noneEditor').style.display = 'flex'; }
        function showFormData(){ document.getElementById('formDataContainer').style.display = 'block'; }
        function showUrlencoded(){ document.getElementById('urlencodedContainer').style.display = 'block'; }
        function showRaw(){
            document.getElementById('typeText').style.display = 'block';
            document.getElementById('formatBtn').style.display = 'block';
            document.getElementById('rawEditor').style.display = 'block';
        }
        function showBinary(){ document.getElementById('binaryArea').style.display = 'block'; }
        function showGraphQL(){
            alert('GraphQL模式开发中');
        }

        function switchType(type){
            currentType = type;
            document.getElementById('typeText').firstChild.textContent = type;
            closeAllDropdowns();
            document.getElementById('formatBtn').style.display = type === 'TEXT' ? 'none' : 'block';
        }
        function formatContent(){
            let content = document.getElementById('rawEditor').innerText.trim();
            if(!content) return;
            try {
                if(currentType === 'JSON'){
                    const jsonObj = JSON.parse(content);
                    const formatted = JSON.stringify(jsonObj, null, 2);
                    document.getElementById('rawEditor').innerHTML = formatted
                        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                        .replace(/"([^"\\]*(\\.[^"\\]*)*)"\s*:/g, '<span class="json-key">"$1"</span>:')
                        .replace(/: "([^"\\]*(\\.[^"\\]*)*)"/g, ': <span class="json-string">"$1"</span>')
                        .replace(/: (\d+(\.\d+)?)/g, ': <span class="json-number">$1</span>')
                        .replace(/: (true|false)/g, ': <span class="json-boolean">$1</span>')
                        .replace(/: null/g, ': <span class="json-null">null</span>')
                        .replace(/([{}[\]])/g, '<span class="json-brace">$1</span>');
                }
            } catch(e) { alert('JSON格式错误！'); }
        }
    </script>
</body>
</html>
